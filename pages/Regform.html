<div class="registration">
<div class="head"></div>
    <h1 class="title">Registration</h1>
    <form id="regForm" class="form-grid" action="#" onsubmit="showMsg(event);">
        
        <div class="regform">
            
            <div class="formGroup">
                <label for="firstName">First Name</label>
                <div class="inputWithSelect">
                    <select>
                        <option value="Mr">Mr</option>
                        <option value="Ms">Ms</option>
                        <option value="Mrs">Mrs</option>
                    </select>
                    <input type="text" id="firstName" name="firstName" placeholder="First Name">
                    <small></small>
                </div>
            </div>

            <div class="formGroup">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name">
                <small></small>
            </div>
			<div class="formGroup">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="User Name">
                <small></small>
            </div>
            
			<div class="formGroup">
                <label for="dob">Date of Birth</label>
                <input type="text" id="dob" placeholder="Date Of Birth">
                <small></small>
            </div>
            <div class="formGroup">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="Phone Number">
                <small></small>
            </div>

            <div class="formGroup">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Email Address">
                <small></small>
            </div>
			<div class="formGroup">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password">
                <small></small>
            </div>
            <div class="formGroup">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password">
                <small></small>
            </div>

        </div>

        <div class="termsContainer">
            <div class="termsContent">
                <input type="checkbox" id="termsCheckbox">
                <label for="termsCheckbox">I have read and agree to the Terms & Conditions<span class="required">*</span></label>
            </div>
        </div>

        <div class="submit">
            <button type="submit" class="sbtn">Submit Application</button>
        </div>
    </form>
</div>
