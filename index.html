  <script>
const images = [
    "https://nwasianweekly.com/wp-content/uploads/2020/02/NAMES-library.jpg",

    "https://cdn.prod.website-files.com/604a97c70aee09eed25ce991/61897a35583a9b51db018d3e_MartinPublicSeating-97560-Importance-School-Library-blogbanner1.jpg",

    "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=1200"
];

let currentImage = 0;

function changeImage() {
    currentImage++;

    if(currentImage >= images.length){
        currentImage = 0;
    }

    document.getElementById("sliderImage").src = images[currentImage];
}

setInterval(changeImage, 2000);
</script>
