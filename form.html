<div class="form-container">
      <form action="#" id="reservationForm" method="POST" onsubmit="return validateForm()">
          
        
        <label for="fullName">Full Name:</label><br>
        <input type="text" id="fullName" name="fullName"><br><br>

        <label for="memberId">Member ID:</label><br>
        <input type="text" id="memberId" name="memberId"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"><br>
          <span class="error-msg" id="emailError" style="display:none">Please enter a valid email</span><br><br>

        <label for="phone">Contact Number:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="category">Book Category:</label><br>
        <select id="category" name="category">
            <option value="empty"> </option>
            <option value="acadamic">Acadamic</option>
            <option value="research">Research & Reference</option>
            <option value="children">Children & Educational</option>
            <option value="digital">Digital Resources</option>
            <option value="fiction">Literature & Fiction</option>
            
        </select><br><br>

        <label for="bookName">Book Name:</label><br>
        <input type="text" id="bookName" name="bookName"><br><br>

        
        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I accept responsibility for returning this book undamaged by due date.</label><br><br>
        
      <label for="reservedate">Reserve Date:</label><br>
      <input type="date" id="reserveDate" name="reserveDate" "><br><br>
      <input type="submit" value="Reserve Book"><br><br>

      </form><br><br>
      
    </div>
      
    <div class="data-reserve">
        <h4 class="data-remain">Days Remaining.</h4> 
        <form action="#" id="reservationForm" method="POST">
        <label for="reserveDate">Reserved Date:</label><br>
        <input type="date" id="reservedDate" name="reserveDate" onchange="showReservedDate()">
        
    </form>
        
        <p id="daysCountDisplay" style="font-weight: bold; color: black;"></p>

        </div>


    <script>

    function validateForm(){
            let x=document.forms["reservationForm2"]["fullName"].value;
            let y=document.forms["reservationForm2"]["memberId"].value;
            let z=document.forms["reservationForm2"]["email"].value;
            let a=document.forms["reservationForm2"]["bookName"].value;
            let b=document.forms["reservationForm2"]["phone"].value;
            let c=document.forms["reservationForm2"]["category"].value;
            let d=document.forms["reservationForm2"]["terms"].checked;
            if(x=="" || y=="" || z=="" || a=="" || b=="" ||c=="" || !d )
                    {
                      alert("Reserved failed ");
                      return false;
                      }
           
            else {alert("successfully Reserved.");
            return true;

            }
            
            }

     document.getElementById('reservationForm2').addEventListener('submit', function(event) {
    event.preventDefault(); 

    
    const emailInput = document.getElementById('email');
     const emailError = document.getElementById('emailError');
    let isValid = true;

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; 

    if (emailInput.value.trim() === "") {
        emailError.textContent = "Please enter your email address";
        emailError.style.display = 'block';
        emailInput.classList.add('invalid'); 
        isValid = false;
    } else if (!emailPattern.test(emailInput.value)) {
        emailError.textContent = "Invalid email format (e.g., name@email.com)";
        emailError.style.display = 'block';
        emailInput.classList.add('invalid');
        isValid = false;
    } else {
        emailError.style.display = 'none';
        emailInput.classList.remove('invalid'); 
    }

  
});
     
    function showReservedDate() {
   
    let inputDateVal = document.getElementById("reservedDate").value;
    
    if (!inputDateVal) {
        return; 
    }

    
    let reservationDate = new Date(inputDateVal);
    
    
    let returnDeadline = new Date(reservationDate);
    returnDeadline.setDate(reservationDate.getDate() + 14);

    
    let today = new Date();
   today.setHours(0, 0, 0, 0);
    returnDeadline.setHours(0, 0, 0, 0);

    
    let timeDifference = returnDeadline.getTime() - today.getTime();

    
    let daysRemaining = Math.ceil(timeDifference / (1000 * 60 * 60 * 24));

    
    let displayElement = document.getElementById("daysCountDisplay");

    if (daysRemaining > 0) {
        displayElement.innerHTML = "There are  " + daysRemaining + " remaining days to return book .";
        displayElement.style.color = "black";
    } else if (daysRemaining === 0) {
        displayElement.innerHTML = "Today is the deadline to return the book!";
        displayElement.style.color = "black";
    } else {
        displayElement.innerHTML = "The return date for the book has expired!";
        displayElement.style.color = "red";
    }
}
    </script>
</body>
