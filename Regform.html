<div class="registration">
<div class="head"></div>
    <h1 class="title">Registration</h1>
    <form class="form-grid" action="#" onsubmit="showMsg(event);">
        
        <div class="regform">
            
            <div class="formGroup">
                <label for="firstName">First Name</label>
                <div class="inputWithSelect">
                    <select>
                        <option value="Mr">Mr</option>
                        <option value="Ms">Ms</option>
                        <option value="Mrs">Mrs</option>
                    </select>
                    <input type="text" id="firstName" placeholder="First Name">
                </div>
            </div>

            <div class="formGroup">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Last Name">
            </div>
			<div class="formGroup">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="User Name">
            </div>
            
			<div class="formGroup">
                <label for="dob">Date of Birth</label>
                <input type="text" id="dob" placeholder="Date Of Birth">
            </div>
            <div class="formGroup">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" placeholder="Phone Number">
            </div>

            <div class="formGroup">
                <label for="emailId">Email ID</label>
                <input type="email" id="emailId" placeholder="Example@Gmail.com">
            </div>
			<div class="formGroup">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="formGroup">
                <label for="confirmPassword">Confirm Password</span></label>
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
            </div>

        </div>

        <div class="termsContainer">
            <div class="termsContent">
                <input type="checkbox" id="termsCheckbox">
                <label for="termsCheckbox">I have read and agree to the Terms & Conditions<span class="required">*</span></label>
            </div>
        </div>

        <div class="submit">
            <button type="submit" class="sbtn">Submit Application</button>
        </div>
    </form>
</div>

	<script>
   function showMsg(event) {
    // Form එක Submit වෙන එක තාවකාලිකව නතර කරනවා
    event.preventDefault(); 

    // Password සහ Confirm Password වල අගයන් ලබා ගැනීම
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    // Error එක පෙන්වන්න තැනක් (span) සාදා ගැනීම (කලින් සාදා නැත්නම් පමණක්)
    let errorText = document.getElementById("pwdError");
    if (!errorText) {
        errorText = document.createElement("span");
        errorText.id = "pwdError";
        errorText.style.color = "red";       // රතු පාටින්
        errorText.style.fontSize = "12px";   // කුඩා අකුරින්
        errorText.style.display = "block";
        errorText.style.marginTop = "5px";
        document.getElementById("confirmPassword").parentNode.appendChild(errorText);
    }

    // Passwords දෙක සමානදැයි පරීක්ෂා කිරීම
    if (password !== confirmPassword) {
        // සමාන නැත්නම් Error message එක පෙන්වනවා
        errorText.innerText = "Passwords do not match!";
    } else {
        // සමාන නම් Error message එක මකා දමනවා
        errorText.innerText = "";
        
        // Passwords සමාන නම් පමණක් ඔබේ පරණ Alert එක පෙන්වා ඊළඟ පිටුවට යනවා
        alert("Application submitted successfully!\n\nPlease visit the library front desk with your ID card to complete your registration.");
        window.location.href = "index.html";
    }
}
    
</script>
